<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.7; color: #000; max-width: 700px; margin: 0 auto; padding: 0; background-color: #fff; }
        
        /* 過去問ページと完全に一致させたメニュー用CSS */
        header { background: #000; color: #fff; padding: 15px 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 45px; }
        .menu-btn { cursor: pointer; background: none; border: none; padding: 0; display: flex; flex-direction: column; justify-content: space-around; width: 28px; height: 20px; flex-shrink: 0; }
        .menu-btn span { display: block; width: 100%; height: 2px; background: #fff; transition: 0.3s; }
        .header-title { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.25em; letter-spacing: 0.08em; white-space: nowrap; }
        .nav-overlay { position: fixed; top: 0; left: -100%; width: 70%; height: 100%; background: #1a1a1a; transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; padding-top: 60px; }
        .nav-overlay.active { left: 0; }
        .nav-overlay a { color: #fff; text-decoration: none; font-size: 1.1em; padding: 20px 30px; border-bottom: 1px solid #333; font-weight: bold; }
        .menu-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .menu-bg.active { display: block; }

        .container { padding: 25px 20px; }
        h1 { border-bottom: 3px solid #000; padding-bottom: 10px; text-align: center; font-size: 1.4em; margin-bottom: 30px; }
        h2 { border-left: 5px solid #000; padding-left: 10px; margin-top: 30px; font-size: 1.1em; background: #f4f4f4; padding: 8px 10px; border-bottom: 1px solid #ccc; }
        
        .main-visual { background: #000; color: #fff; text-align: center; padding: 40px 20px; margin-bottom: 30px; }
        .main-visual h2 { background: none; border: none; font-size: 1.5em; margin: 0; padding: 0; }
        
        .card { border: 1px solid #000; padding: 20px; margin-bottom: 20px; background: #fff; }
        .card h3 { margin-top: 0; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .btn { display: block; width: 100%; background: #000; color: #fff; text-decoration: none; text-align: center; padding: 12px 0; margin-top: 15px; font-weight: bold; }
        
        footer { margin-top: 60px; padding: 20px 0; border-top: 1px solid #000; text-align: center; font-size: 0.8em; color: #666; }
    </style>
    <script src="menu.js"></script>
</head>

        <footer>
            <p>&copy; 2026 全国学習塾名鑑</p>
