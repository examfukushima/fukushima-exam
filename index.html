<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福島県高校入試対策サイト</title>
    <style>
        /* 硬派なモノクロデザイン */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.8; color: #000; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #fff; }
        h1 { border-bottom: 3px solid #000; padding-bottom: 10px; text-align: center; font-size: 1.4em; margin-bottom: 30px; }
        h2 { border-left: 5px solid #000; padding-left: 10px; margin-top: 40px; font-size: 1.1em; background: #f4f4f4; padding: 5px 10px; }
        
        /* シミュレーター */
        .box { border: 1px solid #000; padding: 25px; margin: 20px 0; background-color: #fff; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-weight: bold; flex: 1; }
        .input-group input { width: 80px; padding: 10px; border: 1px solid #000; text-align: center; font-size: 1.1em; }
        button { margin-top: 10px; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; }
        .result { font-weight: bold; font-size: 1.3em; margin-top: 20px; color: #000; text-align: center; border: 2px solid #000; padding: 15px; background-color: #f9f9f9; }
        
        /* 偏差値一覧表 */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        th, td { border: 1px solid #000; padding: 12px 8px; text-align: center; font-size: 0.9em; }
        th { background-color: #000; color: #fff; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* リンクの装飾（モノクロに合わせる） */
        td a { color: #000; text-decoration: underline; font-weight: bold; }
        td a:hover { background-color: #eee; }

        footer { margin-top: 60px; padding: 20px 0; border-top: 1px solid #000; text-align: center; font-size: 0.8em; color: #000; }
    </style>
</head>
<body>

    <h1>福島県高校入試対策サイト</h1>

    <div class="box">
        <h3 style="text-align: center; margin-top: 0;">内申点シミュレーター</h3>
        <div class="input-group"><label for="y1">中学1年 合計</label><input type="number" id="y1" min="9" max="45" value="45"></div>
        <div class="input-group"><label for="y2">中学2年 合計</label><input type="number" id="y2" min="9" max="45" value="45"></div>
        <div class="input-group"><label for="y3">中学3年 合計</label><input type="number" id="y3" min="9" max="45" value="45"></div>
        <button onclick="calculate()">内申点を算出する</button>
        <div id="res" class="result">ここに結果が表示されます</div>
    </div>

    <h2>主要校 偏差値・目標点一覧（県中エリア）</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>高校名（公式HPへ）</th>
                    <th>偏差値</th>
                    <th>目標点</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><a href="https://asaka-h.fcs.ed.jp/" target="_blank">安積</a></td>
                    <td>66-68</td>
                    <td>215点</td>
                </tr>
                <tr>
                    <td><a href="https://asakareimei-h.fcs.ed.jp/" target="_blank">安積黎明</a></td>
                    <td>63-65</td>
                    <td>195点</td>
                </tr>
                <tr>
                    <td><a href="https://koriyama-h.fcs.ed.jp/" target="_blank">郡山</a></td>
                    <td>60-62</td>
                    <td>180点</td>
                </tr>
                <tr>
                    <td><a href="https://koriyamahigashi-h.fcs.ed.jp/" target="_blank">郡山東</a></td>
                    <td>58-60</td>
                    <td>170点</td>
                </tr>
                <tr>
                    <td><a href="https://sukagawatoyo-h.fcs.ed.jp/" target="_blank">須賀川桐陽</a></td>
                    <td>54-56</td>
                    <td>155点</td>
                </tr>
                <tr>
                    <td><a href="https://koriyama-ch.fcs.ed.jp/" target="_blank">郡山商業</a></td>
                    <td>52-54</td>
                    <td>145点</td>
                </tr>
            </tbody>
        </table>
    </div>
    <p style="font-size: 0.8em; margin-top: 10px;">※高校名をクリックすると各校の公式HPが開きます。</p>

    <footer>
        <p>&copy; 2026 全国学習塾名鑑</p>
    </footer>

    <script>
        function calculate() {
            const y1 = parseInt(document.getElementById('y1').value) || 0;
            const y2 = parseInt(document.getElementById('y2').value) || 0;
            const y3 = parseInt(document.getElementById('y3').value) || 0;
            const total = y1 + y2 + y3;
            document.getElementById('res').innerHTML = "あなたの内申点合計<br>" + total + " / 135点";
        }
    </script>
</body>
</html>
