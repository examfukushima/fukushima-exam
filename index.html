<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福島県高校入試対策 - トップページ</title>
    <style>
        /* 基本スタイル */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.7; color: #000; max-width: 700px; margin: 0 auto; padding: 0; background-color: #fcfcfc; }
        
        /* ヘッダー */
        header { background: #000; color: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 45px; }
        .menu-btn { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; justify-content: space-around; width: 28px; height: 20px; }
        .menu-btn span { display: block; width: 100%; height: 2px; background: #fff; transition: 0.3s; }
        .header-title { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.2em; letter-spacing: 0.05em; }
        
        /* ナビゲーション（質問掲示板なし） */
        .nav-overlay { position: fixed; top: 0; left: -100%; width: 70%; height: 100%; background: #1a1a1a; transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; padding-top: 60px; }
        .nav-overlay.active { left: 0; }
        .nav-overlay a { color: #fff; text-decoration: none; font-size: 1.1em; padding: 20px 30px; border-bottom: 1px solid #333; font-weight: bold; }
        .menu-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .menu-bg.active { display: block; }

        /* メインコンテンツ */
        .container { padding: 20px; }
        .hero-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 25px; margin-bottom: 25px; text-align: center; }
        
        /* 入試のしくみ（図解） */
        .flow-container { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #eee; }
        .step-box { display: block; margin: 0 auto; padding: 12px; border: 2px solid #000; font-weight: bold; border-radius: 5px; background: #000; color: #fff; width: 85%; }
        .step-desc { font-size: 0.85em; margin: 8px 0 15px; color: #555; }
        
        /* 誘導ボタン */
        .btn-main { display: block; width: 85%; margin: 15px auto; padding: 18px; background: #d32f2f; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 0 #b71c1c; transition: 0.2s; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #b71c1c; }
        .btn-sub { display: block; width: 85%; margin: 15px auto; padding: 15px; background: #fff; color: #000; text-decoration: none; border: 2px solid #000; border-radius: 5px; font-weight: bold; }

        footer { margin-top: 50px; padding: 30px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <header>
        <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="header-title">福島県高校入試対策</div>
        <div style="width: 28px;"></div>
    </header>

    <div class="menu-bg" id="menuBg" onclick="toggleMenu()"></div>
    <nav class="nav-overlay" id="navOverlay">
        <a href="index.html">トップページ</a>
        <a href="taisaku.html">入試分析・対策</a>
        <a href="kakomon.html">過去問ライブラリ</a>
        <a href="simulator.html">シミュレーター</a>
        <a href="hensachi.html">偏差値一覧</a>
    </nav>

    <div class="container">
        <div class="hero-card">
            <h2 style="font-size: 1.3em; margin-bottom: 15px;">福島県立高校入試のしくみ</h2>
            
            <div class="flow-container">
                <div class="step-box">前期選抜（3月上旬）</div>
                <div class="step-desc"><strong>一般選抜 ＋ 特色選抜</strong><br>学力検査（250点）＋ 調査書点（135点）</div>
                
                <div style="text-align: center; color: #aaa; margin-bottom: 10px;">▼ 不合格の場合</div>
                
                <div class="step-box" style="background: #fff; color: #000; border-style: dashed;">後期選抜（3月中旬）</div>
                <div class="step-desc">欠員補充の入試（面接・小論文など）</div>
            </div>

            <a href="simulator.html" class="btn-main">偏差値を予想する</a>
            <a href="taisaku.html" class="btn-sub">最新の教科別分析</a>
        </div>

        <div style="background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px;">
            <h3 style="font-size: 1em; margin-bottom: 10px; border-bottom: 1px solid #000; display: inline-block;">お知らせ</h3>
            <ul style="padding-left: 20px; font-size: 0.9em; margin-top: 10px;">
                <li>令和8年度入試に向けた分析データを更新しました。</li>
                <li>シミュレーターを「偏差値予想」と「内申点計算」に分離しました。</li>
            </ul>
        </div>

        <footer>
            <p>&copy; 2026 全国学習塾名鑑 / 福島県高校入試対策</p>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navOverlay').classList.toggle('active');
            document.getElementById('menuBg').classList.toggle('active');
        }
    </script>
</body>
</html>
