<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福島県高校入試対策サイト</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.8; color: #000; max-width: 650px; margin: 0 auto; padding: 20px; background-color: #fff; }
        h1 { border-bottom: 3px solid #000; padding-bottom: 10px; text-align: center; font-size: 1.4em; margin-bottom: 30px; }
        h2 { border-left: 5px solid #000; padding-left: 10px; margin-top: 40px; font-size: 1.1em; background: #f4f4f4; padding: 5px 10px; }
        
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: 10px; }
        th, td { border: 1px solid #000; padding: 10px 5px; text-align: center; font-size: 0.85em; }
        th { background-color: #000; color: #fff; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* リンクボタンのスタイル */
        .download-link { color: #000; text-decoration: none; font-weight: bold; display: inline-block; padding: 4px 8px; margin: 2px; border: 1px solid #000; font-size: 0.9em; }
        .download-link:hover { background-color: #eee; }
        .q-tag { color: #d32f2f; } /* 問題: 赤 */
        .a-tag { color: #1976d2; } /* 解答: 青 */

        .box { border: 1px solid #000; padding: 25px; margin: 30px 0; background-color: #fff; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-weight: bold; flex: 1; }
        .input-group input { width: 80px; padding: 10px; border: 1px solid #000; text-align: center; font-size: 1.1em; }
        button { margin-top: 10px; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; }
        .result { font-weight: bold; font-size: 1.3em; margin-top: 20px; text-align: center; border: 2px solid #000; padding: 15px; }
        
        footer { margin-top: 60px; padding: 20px 0; border-top: 1px solid #000; text-align: center; font-size: 0.8em; color: #000; }
    </style>
</head>
<body>

    <h1>福島県高校入試対策サイト</h1>

    <h2>福島県公立高校入試 過去問ライブラリ</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>年度</th>
                    <th>国語</th>
                    <th>数学</th>
                    <th>英語</th>
                    <th>理科</th>
                    <th>社会</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>2026</strong></td>
                    <td>
                        <a href="mondai-kokugo2026.pdf" target="_blank" class="download-link"><span class="q-tag">問</span></a>
                        <a href="kaito-kokugo2026.pdf" target="_blank" class="download-link"><span class="a-tag">解</span></a>
                    </td>
                    <td>
                        <a href="mondai-sugaku2026.pdf" target="_blank" class="download-link"><span class="q-tag">問</span></a>
                        <a href="kaito-sugaku2026.pdf" target="_blank" class="download-link"><span class="a-tag">解</span></a>
                    </td>
                    <td>
                        <a href="mondai-eigo2026.pdf" target="_blank" class="download-link"><span class="q-tag">問</span></a>
                        <a href="kaito-eigo2026.pdf" target="_blank" class="download-link"><span class="a-tag">解</span></a>
                    </td>
                    <td>
                        <a href="mondai-rika2026.pdf" target="_blank" class="download-link"><span class="q-tag">問</span></a>
                        <a href="kaito-rika2026.pdf" target="_blank" class="download-link"><span class="a-tag">解</span></a>
                    </td>
                    <td>
                        <a href="mondai-shakai2026.pdf" target="_blank" class="download-link"><span class="q-tag">問</span></a>
                        <a href="kaito-shakai2026.pdf" target="_blank" class="download-link"><span class="a-tag">解</span></a>
                    </td>
                </tr>
                <tr>
                    <td>2025</td>
                    <td colspan="5">（順次掲載予定）</td>
                </tr>
            </tbody>
        </table>
    </div>
    <p style="font-size: 0.75em;">※<span class="q-tag">問</span>は問題、<span class="a-tag">解</span>は解答（PDF）が開きます。</p>

    <div class="box">
        <h3 style="text-align: center; margin-top: 0;">内申点シミュレーター</h3>
        <div class="input-group"><label>中学1年</label><input type="number" id="y1" min="9" max="45" placeholder="例: 45"></div>
        <div class="input-group"><label>中学2年</label><input type="number" id="y2" min="9" max="45" placeholder="例: 45"></div>
        <div class="input-group"><label>中学3年</label><input type="number" id="y3" min="9" max="45" placeholder="例: 45"></div>
        <button onclick="calculate()">内申点を算出する</button>
        <div id="res" class="result">ここに結果が表示されます</div>
    </div>

    <footer>
        <p>&copy; 2026 全国学習塾名鑑</p>
    </footer>

    <script>
        function calculate() {
            const v1 = document.getElementById('y1').value;
            const v2 = document.getElementById('y2').value;
            const v3 = document.getElementById('y3').value;
            if (v1 === "" || v2 === "" || v3 === "") { alert("値を入力してください"); return; }
            const total = parseInt(v1) + parseInt(v2) + parseInt(v3);
            document.getElementById('res').innerHTML = "あなたの内申点合計<br>" + total + " / 135点";
        }
    </script>
</body>
</html>
