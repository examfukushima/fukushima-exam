<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シミュレーター - 福島県高校入試対策</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* スタイル：index.htmlと共通のヘッダー・ナビ設定を維持 */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.6; color: #000; max-width: 700px; margin: 0 auto; padding: 0; background-color: #fcfcfc; }
        header { background: #000; color: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 45px; }
        .menu-btn { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; justify-content: space-around; width: 28px; height: 20px; }
        .menu-btn span { display: block; width: 100%; height: 2px; background: #fff; transition: 0.3s; }
        .header-title { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.2em; }
        .nav-overlay { position: fixed; top: 0; left: -100%; width: 70%; height: 100%; background: #1a1a1a; transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; padding-top: 60px; }
        .nav-overlay.active { left: 0; }
        .nav-overlay a { color: #fff; text-decoration: none; font-size: 1.1em; padding: 20px 30px; border-bottom: 1px solid #333; font-weight: bold; }
        .menu-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .menu-bg.active { display: block; }

        .container { padding: 20px; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1em; border-left: 5px solid #d32f2f; padding-left: 10px; margin-bottom: 20px; }
        
        /* 入力時に拡大されないようフォントサイズを16pxに固定 */
        input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
        }
        
        .calc-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .res-box { display: none; margin-top: 20px; padding: 15px; background: #f0f0f0; text-align: center; border: 2px solid #000; border-radius: 8px; }
        .res-val { font-size: 2.2em; font-weight: bold; color: #d32f2f; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chart-container { width: 100%; max-width: 300px; margin: 20px auto; }
        footer { text-align: center; font-size: 0.8em; padding: 40px 0; color: #888; }
    </style>
    <script src="menu.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>偏差値予想シミュレーター</h2>
            <div class="input-grid">
                <div><label style="font-size:12px; font-weight:bold;">国語</label><input type="number" id="s1" placeholder="0-50"></div>
                <div><label style="font-size:12px; font-weight:bold;">数学</label><input type="number" id="s2" placeholder="0-50"></div>
                <div><label style="font-size:12px; font-weight:bold;">英語</label><input type="number" id="s3" placeholder="0-50"></div>
                <div><label style="font-size:12px; font-weight:bold;">理科</label><input type="number" id="s4" placeholder="0-50"></div>
                <div><label style="font-size:12px; font-weight:bold;">社会</label><input type="number" id="s5" placeholder="0-50"></div>
            </div>
            <button class="calc-btn" style="background:#d32f2f;" onclick="calcHensachi()">偏差値を予想する</button>
            <div id="h-res" class="res-box">
                <span style="font-size: 0.9em; font-weight: bold;">予想偏差値</span><br>
                <span class="res-val" id="h-val">0</span>
                <div class="chart-container"><canvas id="radarChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2>内申点計算シミュレーター</h2>
            <p style="font-size:11px; color:#666; margin-bottom: 15px;">※各学年の9教科（5段階評定）の合計を入力してください。</p>
            <label style="font-size:12px; font-weight:bold;">中1 合計(最大45)</label><input type="number" id="n1" placeholder="例: 36">
            <label style="font-size:12px; font-weight:bold;">中2 合計(最大45)</label><input type="number" id="n2" placeholder="例: 38">
            <label style="font-size:12px; font-weight:bold;">中3 合計(最大45)</label><input type="number" id="n3" placeholder="例: 40">
            <button class="calc-btn" onclick="calcNaishin()">内申点を算出する</button>
            <div id="n-res" class="res-box">
                <span style="font-size: 0.9em; font-weight: bold;">あなたの内申点</span><br>
                <span class="res-val" id="n-val">0</span> <span style="font-weight: bold;">/ 135</span>
            </div>
        </div>

        <footer>&copy; 2026 全国学習塾名鑑 / 福島県高校入試対策</footer>
    </div>

    <script>
        let myChart = null;

        // 偏差値計算ロジック
        function calcHensachi() {
            const s = [
                parseFloat(document.getElementById('s1').value)||0,
                parseFloat(document.getElementById('s2').value)||0,
                parseFloat(document.getElementById('s3').value)||0,
                parseFloat(document.getElementById('s4').value)||0,
                parseFloat(document.getElementById('s5').value)||0
            ];
            const total = s.reduce((a,b)=>a+b,0);
            
            // 簡易偏差値計算（基準値などは森様の知見に合わせて調整可能）
            const h = ((total - 125) / 5) + 50; 
            
            document.getElementById('h-val').innerText = h.toFixed(1);
            document.getElementById('h-res').style.display = 'block';
            
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['国','数','英','理','社'],
                    datasets: [{
                        label: '得点分布',
                        data: s,
                        backgroundColor: 'rgba(211, 47, 47, 0.2)',
                        borderColor: '#d32f2f',
                        borderWidth: 2,
                        pointBackgroundColor: '#d32f2f'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0,
                            max: 50,
                            ticks: { display: false, stepSize: 10 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 内申点計算ロジック
        function calcNaishin() {
            const v1 = parseFloat(document.getElementById('n1').value)||0;
            const v2 = parseFloat(document.getElementById('n2').value)||0;
            const v3 = parseFloat(document.getElementById('n3').value)||0;
            document.getElementById('n-val').innerText = (v1 + v2 + v3).toFixed(0);
            document.getElementById('n-res').style.display = 'block';
        }
    </script>
</body>
</html>
