<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シミュレーター - 福島県高校入試対策</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #000; max-width: 700px; margin: 0 auto; padding: 0; background-color: #fcfcfc; }
        header { background: #000; color: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 45px; }
        .header-title { flex-grow: 1; text-align: center; font-weight: bold; }
        
        .container { padding: 20px; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 30px; }
        h2 { font-size: 1.1em; border-left: 5px solid #d32f2f; padding-left: 10px; margin-bottom: 20px; }
        
        /* 入力時に拡大されないようフォントサイズを16pxに固定 */
        input[type="number"], select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
        }
        
        .calc-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .res-box { display: none; margin-top: 20px; padding: 15px; background: #f0f0f0; text-align: center; border: 2px solid #000; }
        .res-val { font-size: 2em; font-weight: bold; color: #d32f2f; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chart-container { width: 100%; max-width: 300px; margin: 20px auto; }
        footer { text-align: center; font-size: 0.8em; padding: 40px 0; }
    </style>
</head>
<body>
    <header><div class="header-title">福島県高校入試対策</div></header>

    <div class="container">
        <div class="card">
            <h2>偏差値予想シミュレーター</h2>
            <div class="input-grid">
                <div><label style="font-size:12px;">国語</label><input type="number" id="s1" placeholder="0-50"></div>
                <div><label style="font-size:12px;">数学</label><input type="number" id="s2" placeholder="0-50"></div>
                <div><label style="font-size:12px;">英語</label><input type="number" id="s3" placeholder="0-50"></div>
                <div><label style="font-size:12px;">理科</label><input type="number" id="s4" placeholder="0-50"></div>
                <div><label style="font-size:12px;">社会</label><input type="number" id="s5" placeholder="0-50"></div>
            </div>
            <button class="calc-btn" style="background:#d32f2f;" onclick="calcHensachi()">偏差値を予想する</button>
            <div id="h-res" class="res-box">
                予想偏差値：<span class="res-val" id="h-val">0</span>
                <div class="chart-container"><canvas id="radarChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2>内申点計算シミュレーター</h2>
            <p style="font-size:12px; color:#666;">各学年の9教科評定合計を入力（最大45）</p>
            <label style="font-size:12px;">中1 合計</label><input type="number" id="n1" placeholder="45">
            <label style="font-size:12px;">中2 合計</label><input type="number" id="n2" placeholder="45">
            <label style="font-size:12px;">中3 合計</label><input type="number" id="n3" placeholder="45">
            <button class="calc-btn" onclick="calcNaishin()">内申点を算出する</button>
            <div id="n-res" class="res-box">
                内申点合計：<span class="res-val" id="n-val">0</span> / 135
            </div>
        </div>

        <footer>&copy; 2026 全国学習塾名鑑</footer>
    </div>

    <script>
        let myChart = null;
        function calcHensachi() {
            const s = [
                parseFloat(document.getElementById('s1').value)||0,
                parseFloat(document.getElementById('s2').value)||0,
                parseFloat(document.getElementById('s3').value)||0,
                parseFloat(document.getElementById('s4').value)||0,
                parseFloat(document.getElementById('s5').value)||0
            ];
            const total = s.reduce((a,b)=>a+b,0);
            const h = ((total - 125) / 5) + 50; 
            document.getElementById('h-val').innerText = h.toFixed(1);
            document.getElementById('h-res').style.display = 'block';
            
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['国','数','英','理','社'],
                    datasets: [{ data: s, backgroundColor: 'rgba(211,47,47,0.2)', borderColor: '#d32f2f', borderWidth: 2 }]
                },
                options: { scales: { r: { min: 0, max: 50, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        function calcNaishin() {
            const v1 = parseFloat(document.getElementById('n1').value)||0;
            const v2 = parseFloat(document.getElementById('n2').value)||0;
            const v3 = parseFloat(document.getElementById('n3').value)||0;
            document.getElementById('n-val').innerText = v1 + v2 + v3;
            document.getElementById('n-res').style.display = 'block';
        }
    </script>
</body>
</html>
