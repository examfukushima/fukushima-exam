<!DOCTYPE html>

    <style>
        /* 共通スタイル */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; line-height: 1.7; color: #000; max-width: 700px; margin: 0 auto; padding: 0; background-color: #fcfcfc; }
        
        header { background: #000; color: #fff; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 45px; }
        .menu-btn { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; justify-content: space-around; width: 28px; height: 20px; }
        .menu-btn span { display: block; width: 100%; height: 2px; background: #fff; transition: 0.3s; }
        .header-title { flex-grow: 1; text-align: center; font-weight: bold; font-size: 1.2em; }
        
        .nav-overlay { position: fixed; top: 0; left: -100%; width: 70%; height: 100%; background: #1a1a1a; transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; padding-top: 60px; }
        .nav-overlay.active { left: 0; }
        .nav-overlay a { color: #fff; text-decoration: none; font-size: 1.1em; padding: 20px 30px; border-bottom: 1px solid #333; font-weight: bold; }
        .menu-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .menu-bg.active { display: block; }

        .container { padding: 25px 20px; }
        h1 { border-bottom: 3px solid #000; padding-bottom: 10px; text-align: center; font-size: 1.4em; margin-bottom: 30px; }
        
        /* テーブルのレスポンシブ対応 */
        .table-container { overflow-x: auto; margin-top: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { border: 1px solid #eee; padding: 15px 5px; text-align: center; font-size: 0.85em; }
        th { background-color: #000; color: #fff; border: 1px solid #000; }
        
        /* ダウンロードボタンの装飾 */
        .download-link { color: #000; text-decoration: none; font-weight: bold; display: inline-block; padding: 8px 10px; border: 1px solid #000; margin: 2px; background: #fff; font-size: 0.9em; border-radius: 4px; transition: 0.2s; }
        .download-link:active { background: #eee; transform: translateY(1px); }
        .q-tag { color: #d32f2f; border-color: #d32f2f; } /* 問題 */
        .a-tag { color: #1976d2; border-color: #1976d2; } /* 解答 */

        footer { margin-top: 60px; padding: 30px 0; border-top: 1px solid #eee; text-align: center; font-size: 0.8em; color: #888; }
